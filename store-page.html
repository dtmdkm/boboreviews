<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="referrer" content="no-referrer">
  <title>Store | Boboreviews</title>
  <link rel="icon" type="image/png" href="/favicon.png">
  <link rel="stylesheet" href="/style.css">
</head>
<body>

  <header style="background: white; border-bottom: 1px solid #e2e8f0; padding: 15px 0;">
    <div class="container header-inner" style="justify-content: center;">
      <a href="/" class="logo" style="color: #1e293b; font-size: 1.5rem;">BOBO<span>REVIEWS</span></a>
    </div>
  </header>

  <div id="store-content" class="container" style="margin-top: 40px; min-height: 600px;">
    <div class="loading-state" style="text-align: center; padding: 100px;">
      <h2>Loading Store Details...</h2>
    </div>
  </div>

  <script type="module">
    async function fetchStoreDetails() {
      // Robust Slug Extraction
      const urlParams = new URLSearchParams(window.location.search);
      let slug = urlParams.get('slug');
      
      if (!slug) {
        const pathParts = window.location.pathname.split('/').filter(p => p);
        if (pathParts.includes('store')) {
          slug = pathParts[pathParts.indexOf('store') + 1];
        } else {
          slug = pathParts[pathParts.length - 1];
        }
      }

      if (!slug) return window.location.href = '/';

      const container = document.getElementById('store-content');

      try {
        const res = await fetch('https://admin.boboreviews.com/api/data');
        const data = await res.json();

        const store = data.popularStores.find(s => s.slug === slug);
        if (!store) {
          container.innerHTML = '<div style="text-align: center; padding: 100px;"><h2>Store Not Found</h2><a href="/" class="btn-deal" style="width: auto; display: inline-block; padding: 10px 30px; margin-top: 20px;">Go Back Home</a></div>';
          return;
        }

        document.title = `${store.name} - Boboreviews`;

        container.innerHTML = `
          <div class="store-header glass animate" style="padding: 40px; border-radius: 24px; display: flex; align-items: center; gap: 40px; margin-bottom: 40px; background: white;">
            <img src="${store.image || '/placeholder-store.jpg'}" alt="${store.name}" style="width: 150px; height: 150px; border-radius: 20px; object-fit: contain; border: 1px solid #eee;">
            <div>
              <h1 style="font-size: 2.5rem; margin-bottom: 10px;">${store.name}</h1>
              <p style="font-size: 1.1rem; color: #64748b;">${store.description || 'Verified Store and Top Deals'}</p>
              <div style="margin-top: 20px; display: flex; gap: 15px;">
                <span style="background: #f1f5f9; padding: 5px 15px; border-radius: 20px; font-size: 0.9rem;">⭐ ${store.rating || 5}.0 Rating</span>
                <span style="background: #f1f5f9; padding: 5px 15px; border-radius: 20px; font-size: 0.9rem;">✅ Verified</span>
              </div>
            </div>
          </div>

          <div class="deals-grid">
            <div style="grid-column: 1 / -1; margin-bottom: 20px;">
              <h2>Active Coupons & Deals</h2>
            </div>
            ${(data.deals || []).filter(d => (d.storeId?._id || d.storeId?.id || d.storeId) === (store.id || store._id)).map(deal => `
              <div class="deal-card animate" style="background: white;">
                <div class="deal-content">
                  <h3 class="deal-title">${deal.title}</h3>
                  <p style="font-size: 0.9rem; color: #64748b; margin-bottom: 15px;">${deal.description || 'Get this amazing deal now!'}</p>
                  <div class="deal-prices">
                    ${deal.price ? `<span class="price-old">${deal.price}</span>` : ''}
                    <span class="price-new">${deal.discountPrice || 'FREE'}</span>
                  </div>
                  <a href="${deal.link}" class="btn-deal" target="_blank">Get Deal</a>
                </div>
              </div>
            `).join('') || '<div style="grid-column: 1 / -1; text-align: center; padding: 40px; background: white; border-radius: 20px;">No active deals for this store yet.</div>'}
          </div>
        `;

      } catch (error) {
        console.error("Error:", error);
        container.innerHTML = '<h2>Connection Error</h2>';
      }
    }

    fetchStoreDetails();
  </script>
</body>
</html>
