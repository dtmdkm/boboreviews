<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="referrer" content="no-referrer">
  <title>Boboreviews | Store Detail</title>
  <link rel="icon" type="image/png" href="favicon.png">
  <link rel="stylesheet" href="style.css">
  <style>
    /* Inline fixes for structural integrity */
    #loading { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 400px; }
    .store-layout { display: none; } /* Hidden by default, shown by JS */
  </style>
</head>
<body>

  <header>
    <div class="container header-inner">
      <a href="/" class="logo" style="display: flex; align-items: center;">
        <img src="favicon.png" alt="Boboreviews Logo" style="height: 32px; margin-right: 8px; border-radius: 4px;">
        BOBO<span>REVIEWS</span>
      </a>
      <div class="search-bar">
        <input type="text" placeholder="Search for stores, deals or tools...">
      </div>
      <nav>
        <a href="/" style="font-weight: 600; color: #1a4d2e;">← Back to Home</a>
      </nav>
    </div>
  </header>

  <main class="container">
    <!-- Hero Banner Section -->
    <div id="store-banner-container" style="width: 100%; height: 250px; background: #0f172a; border-radius: 16px; margin-top: 20px; overflow: hidden; display: none; position: relative;">
      <img id="store-banner-img" src="" alt="Banner" style="width: 100%; height: 100%; object-fit: cover; opacity: 0.6;">
      <div style="position: absolute; bottom: 30px; left: 40px; color: white;">
        <h1 id="banner-store-name" style="font-size: 2.5rem; margin: 0;"></h1>
        <p id="banner-store-desc" style="opacity: 0.9; margin-top: 5px;"></p>
      </div>
    </div>

    <!-- Loading State -->
    <div id="loading">
      <div class="skeleton-deal skeleton" style="width: 100%; height: 200px; margin-bottom: 20px;"></div>
      <h2 style="color: #64748b;">Loading Store Details...</h2>
    </div>

    <div class="store-layout" id="store-content">
      <!-- Sidebar -->
      <aside>
        <div class="sidebar-card">
          <img id="store-logo" src="" alt="Store Logo" class="store-logo-large">
          <h2 id="sidebar-name" style="font-size: 1.2rem; margin-bottom: 5px;"></h2>
          <div class="stars">★★★★★</div>
          <div style="font-size: 0.8rem; color: #999;" id="vote-count">5.0 / 1,250 votes</div>
          <button class="btn-alert">Get Coupon Alert</button>
        </div>
        
        <div class="stats-box">
          <div class="stat-row">
            <span id="coupon-count-label">0 Coupons Available</span>
          </div>
          <div class="stat-row">
            <span>Coupon Codes</span>
            <b id="codes-count">0</b>
          </div>
          <div class="stat-row">
            <span>Deals</span>
            <b id="deals-count">0</b>
          </div>
        </div>
      </aside>

      <!-- Main Content -->
      <section>
        <div class="promo-header">
          <h1 id="promo-title"> Coupons and Promo Codes</h1>
        </div>

        <div class="filter-tabs" id="filter-tabs-container">
          <!-- Populated by JS -->
        </div>

        <div id="coupons-list">
          <!-- Coupons populated here -->
        </div>

        <div class="about-section">
          <h2>About <span id="about-store-name">store</span></h2>
          <div id="store-review-body" class="content-body">
            <!-- Review content here -->
          </div>
        </div>
      </section>
    </div>
  </main>

  <!-- Coupon Modal -->
  <div id="coupon-modal" class="modal-overlay">
    <div class="modal-popup">
      <div class="modal-header-bar"></div>
      <span class="modal-close" onclick="closeModal()">&times;</span>
      <div class="modal-body" id="modal-dynamic-content">
        <!-- Content filled by JS -->
      </div>
    </div>
  </div>

  <footer>
    <div class="container" style="text-align: center; padding: 40px 0; color: #94a3b8; font-size: 0.9rem;">
      <p>&copy; 2026 Boboreviews. Built with premium aesthetics.</p>
    </div>
  </footer>

  <script>
    let allDeals = [];
    let currentStore = null;

    async function loadStore() {
      const urlParams = new URLSearchParams(window.location.search);
      const slug = urlParams.get('slug');
      const offerId = urlParams.get('offer');
      
      if (!slug) {
        window.location.href = '/';
        return;
      }

      try {
        const response = await fetch(`https://admin.boboreviews.com/api/stores/slug/${slug}`);
        const data = await response.json();

        if (data.error) {
          document.getElementById('loading').innerHTML = `<h2 style="color: #ef4444;">Store Not Found</h2><p>${data.error}</p>`;
          return;
        }

        currentStore = data;
        allDeals = data.deals || [];

        // 1. Fill Banner
        if (data.banner) {
          document.getElementById('store-banner-img').src = data.banner;
          document.getElementById('banner-store-name').textContent = data.name;
          document.getElementById('banner-store-desc').textContent = data.description || '';
          document.getElementById('store-banner-container').style.display = 'block';
        }

        // 2. Fill Sidebar
        const storeLogo = document.getElementById('store-logo');
        if (storeLogo) storeLogo.src = data.image || 'favicon.png';
        
        const sidebarName = document.getElementById('sidebar-name');
        if (sidebarName) sidebarName.textContent = data.name;
        
        const aboutName = document.getElementById('about-store-name');
        if (aboutName) aboutName.textContent = data.name;
        
        const promoTitle = document.getElementById('promo-title');
        if (promoTitle) promoTitle.textContent = `${data.name} Coupons and Promo Codes`;
        
        const voteCount = document.getElementById('vote-count');
        if (voteCount) voteCount.textContent = `${data.rating?.toFixed(1) || '5.0'} / ${data.totalVotes?.toLocaleString() || '1,250'} votes`;
        
        const alertBtn = document.querySelector('.btn-alert');
        if (alertBtn) {
          alertBtn.style.cursor = 'pointer';
          alertBtn.onclick = () => {
            if (allDeals.length > 0) handleOpenDeal(allDeals[0].id);
            else window.open(data.link || '#', '_blank');
          };
        }
        
        const codes = allDeals.filter(d => d.type === 'code');
        const deals = allDeals.filter(d => d.type === 'deal');
        
        document.getElementById('codes-count').textContent = codes.length;
        document.getElementById('deals-count').textContent = deals.length;
        document.getElementById('coupon-count-label').textContent = `${allDeals.length} Coupons Available`;

        // 3. Update Tabs
        const tabsContainer = document.getElementById('filter-tabs-container');
        tabsContainer.innerHTML = `
          <div class="tab active" onclick="applyFilter('all')">All(${allDeals.length})</div>
          <div class="tab" onclick="applyFilter('code')">Codes(${codes.length})</div>
          <div class="tab" onclick="applyFilter('deal')">Deals(${deals.length})</div>
        `;

        // 4. Fill Review
        document.getElementById('store-review-body').innerHTML = data.content || `Welcome to ${data.name}. Enjoy the best deals and coupons verified daily.`;

        // 5. Render Deals
        renderDeals(allDeals);

        // 6. Show Content
        document.getElementById('loading').style.display = 'none';
        document.getElementById('store-content').style.display = 'grid';

        // 7. Auto-show modal if offerId present
        if (offerId) {
          showDealModal(offerId);
        }

      } catch (error) {
        console.error("Load Store Error:", error);
        document.getElementById('loading').innerHTML = '<h2 style="color: #ef4444;">Connection Error</h2><p>Please check your internet and try again.</p>';
      }
    }

    function renderDeals(dealsToRender) {
      const list = document.getElementById('coupons-list');
      if (!list) return;
      list.innerHTML = '';
      
      dealsToRender.forEach(deal => {
        const card = document.createElement('div');
        card.className = 'coupon-card';
        
        const discountVal = deal.discountValue || deal.discount || 'SALE';
        const dealCode = deal.code || '';

        if (dealCode) {
          // Show last 3 chars as hint
          const hint = dealCode.length > 3 ? `...${dealCode.slice(-3)}` : dealCode;
          card.innerHTML = `
            <div class="save-badge">
              <span class="amount">${discountVal}</span>
              <span class="label">OFF</span>
            </div>
            <div class="coupon-info">
              <div class="verified-tag">Verified Code</div>
              <h3>${deal.title}</h3>
              <p>${deal.description || ''}</p>
            </div>
            <div class="coupon-action">
              <div class="get-code-wrapper" onclick="handleOpenDeal('${deal.id}')">
                <span class="code-hint">${hint}</span>
                <div class="btn-peel">Get Code</div>
              </div>
            </div>
          `;
        } else {
          card.innerHTML = `
            <div class="save-badge">
              <span class="amount">${discountVal}</span>
              <span class="label">OFF</span>
            </div>
            <div class="coupon-info">
              <div class="verified-tag" style="color: #64748b; border-color: #e2e8f0;">Verified Deal</div>
              <h3>${deal.title}</h3>
              <p>${deal.description || ''}</p>
            </div>
            <div class="coupon-action">
              <a href="javascript:void(0)" class="btn-get" onclick="handleOpenDeal('${deal.id}')">Get Deal</a>
            </div>
          `;
        }
        list.appendChild(card);
      });
    }

    window.applyFilter = function(type) {
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      event.target.classList.add('active');
      if (type === 'all') renderDeals(allDeals);
      else renderDeals(allDeals.filter(d => d.type === type));
    };

    window.handleOpenDeal = function(dealId) {
      const deal = allDeals.find(d => d.id === dealId);
      if (!deal) return;
      
      // 1. Show modal in this tab FIRST
      showDealModal(dealId);
      
      // 2. Open affiliate link in NEW tab after a tiny delay
      setTimeout(() => {
        window.open(deal.link, '_blank');
      }, 150);
      
      // Track click
      fetch(`https://admin.boboreviews.com/api/deals/${dealId}/click`, { method: 'POST' }).catch(() => {});
    };

    window.showDealModal = function(dealId) {
      const deal = allDeals.find(d => d.id === dealId);
      if (!deal) return;

      const modalContent = document.getElementById('modal-dynamic-content');
      const logo = currentStore.image || 'favicon.png';
      
      if (deal.code) {
        modalContent.innerHTML = `
          <img src="${logo}" alt="Logo" class="modal-store-logo">
          <h3 class="modal-title">${deal.title}</h3>
          <p class="modal-instruction">Copy the code and use it at checkout</p>
          <div class="code-box">
            <div id="modal-code" class="code-text">${deal.code}</div>
            <button class="copy-btn" onclick="copyCode()">Copy Code</button>
          </div>
          <a href="${deal.link}" target="_blank" class="modal-footer-link">Visit ${currentStore.name} →</a>
        `;
      } else {
        modalContent.innerHTML = `
          <img src="${logo}" alt="Logo" class="modal-store-logo">
          <h3 class="modal-title">${deal.title}</h3>
          <p class="modal-instruction" style="margin-bottom: 25px;">No code needed. Click below to activate the deal.</p>
          <a href="${deal.link}" target="_blank" class="btn-get" style="display: block; width: 100%;">Activate Deal</a>
          <a href="${deal.link}" target="_blank" class="modal-footer-link">Go to ${currentStore.name} →</a>
        `;
      }

      document.getElementById('coupon-modal').style.display = 'flex';
    };

    window.closeModal = function() {
      document.getElementById('coupon-modal').style.display = 'none';
    };

    window.copyCode = function() {
      const code = document.getElementById('modal-code').textContent;
      navigator.clipboard.writeText(code).then(() => {
        const btn = document.querySelector('.copy-btn');
        btn.textContent = 'COPIED!';
        btn.style.background = '#166534';
      });
    };

    loadStore();
  </script>
</body>
</html>
